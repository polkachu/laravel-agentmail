name: Deploy docusaurus site

on:
    push:
        branches: [master]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: docusaurus/package-lock.json

            - name: Install deps
              run: npm ci
              working-directory: docusaurus

            - name: Build site
              run: npm run build
              working-directory: docusaurus

