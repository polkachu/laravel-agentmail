name: Deploy docusaurus site

on:
    push:
        branches:
            - master
        paths:
            - 'docusaurus/**'
            - '.github/workflows/deploy.yml'

concurrency:
    group: deploy-docusaurus-master
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            contents: read

        defaults:
            run:
                shell: bash
                working-directory: docusaurus

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: docusaurus/package-lock.json

            - name: Install deps
              run: npm ci

            - name: Build site
              run: npm run build

            - name: Configure SSH
              working-directory: .
              env:
                  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_PORT: ${{ secrets.VPS_PORT }}
              run: |
                  set -euo pipefail
                  mkdir -p ~/.ssh
                  printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

            - name: Deploy files
              working-directory: .
              env:
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_PORT: ${{ secrets.VPS_PORT }}
                  VPS_USER: ${{ secrets.VPS_USER }}
              run: |
                  set -euo pipefail
                  rsync -az --delete \
                    --omit-dir-times \
                    --no-perms \
                    --no-owner \
                    --no-group \
                    -e "ssh -p $VPS_PORT -i ~/.ssh/id_rsa" \
                    docusaurus/build/ \
                    "$VPS_USER@$VPS_HOST:/home/ubuntu/sites/agentmail/"

            - name: Verify deployed site
              working-directory: .
              run: curl -fsS https://agentmail.polkachu.com/ >/dev/null
