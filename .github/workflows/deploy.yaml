name: Deploy docusaurus site

on:
    push:
        branches: [master]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: docusaurus/package-lock.json

            - name: Install deps
              run: npm ci
              working-directory: docusaurus

            - name: Build site
              run: npm run build
              working-directory: docusaurus

            - name: Add SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

            - name: Deploy files
              run: |
                  rsync -avz --delete -e "ssh -p ${{ secrets.VPS_PORT }}" docusaurus/build/ \
                    ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ubuntu/sites/agentmail
